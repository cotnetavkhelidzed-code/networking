<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POST demo</title>
</head>
<body>

<h2>POST /hello demo</h2>

<form action="http://localhost:8080/hello" method="post">
    <label>
        Name:
        <input type="text" name="name" value="Giorgi">
    </label>
    <br><br>
    <label>
        City:
        <input type="text" name="city" value="Tbilisi">
    </label>
    <br><br>
    <button type="submit">Send POST</button>
</form>

</body>
</html>
